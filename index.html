        // --- Core Smart Money Concepts (SMC) Analytics Block ---
        function detectFVG(data) {
            let fvgs = [];
            for (let i = 2; i < data.length; i++) {
                let prev = data[i - 2], next = data[i];
                if (prev.high < next.low) {
                    fvgs.push({ type: 'bullish', bottom: prev.high, top: next.low });
                } else if (prev.low > next.high) {
                    fvgs.push({ type: 'bearish', top: prev.low, bottom: next.high });
                }
            }
            return fvgs;
        }

        function detectOB(data) {
            let obs = [];
            for (let i = 1; i < data.length; i++) {
                let prev = data[i - 1], curr = data[i];
                if (prev.close < prev.open && curr.close > curr.open) {
                    obs.push({ type: 'bullish', high: prev.high, low: prev.low });
                } else if (prev.close > prev.open && curr.close < curr.open) {
                    obs.push({ type: 'bearish', high: prev.high, low: prev.low });
                }
            }
            return obs;
        }

        function detectBOS(data) {
            if (data.length < 16) return null;
            let lastPrice = data[data.length - 1].close;
            let lookback = data.slice(-16, -1);
            let highestHigh = Math.max(...lookback.map(d => d.high));
            let lowestLow = Math.min(...lookback.map(d => d.low));
            
            if (lastPrice > highestHigh) return 'Bullish BOS';
            if (lastPrice < lowestLow) return 'Bearish BOS';
            return null;
        }

            if (symbol === 'nas100') baseAnchor = 18700.00;

                let open = baseAnchor + (Math.random() - 0.5) * range;

                    high: Math.max(open, close) + (Math.random() * (range * 0.15)),
                    low: Math.min(open, close) - (Math.random() * (range * 0.15))

                baseAnchor = close;

            return dataset;
